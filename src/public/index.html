<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>To-Do App</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="todo-card">
        <header class="todo-header">
          <p class="eyebrow">Personal Planner</p>
          <h1>To-Do List</h1>
          <p class="subtitle">Track your tasks for today.</p>
        </header>

        <form id="todo-form" class="todo-form">
          <input
            id="todo-input"
            type="text"
            placeholder="Add a new task..."
            maxlength="120"
            required
          />
          <button type="submit">Add</button>
        </form>

        <ul id="todo-list" class="todo-list" aria-live="polite"></ul>

        <footer class="todo-footer">
          <span id="task-count">0 tasks</span>
          <button id="clear-completed" type="button">Clear completed</button>
        </footer>
      </section>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
